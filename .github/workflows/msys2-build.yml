name: MSYS2 C++ Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load config.js
        id: cfg
        run: |
          node -e "
            const cfg = require('./msys2.config.js');

            if (typeof cfg.commitEXE !== 'boolean') process.exit(1);
            if (typeof cfg.CI !== 'boolean') process.exit(1);

            if (!cfg.Advanced) process.exit(1);
            if (!cfg.Advanced.target) process.exit(1);
            if (!cfg.Advanced.output) process.exit(1);
            if (!cfg.Advanced.commit2) process.exit(1);

            console.log('commitEXE=' + cfg.commitEXE);
            console.log('CI=' + cfg.CI);
            console.log('target=' + cfg.Advanced.target);
            console.log('output=' + cfg.Advanced.output);
            console.log('commit2=' + cfg.Advanced.commit2);
          " >> $GITHUB_OUTPUT

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            mingw-w64-x86_64-gcc
          msystem: MINGW64

      - name: Build EXE
        shell: msys2 {0}
        run: |
          mkdir -p build
          g++ "${{ steps.cfg.outputs.target }}" -O2 -static -o "build/${{ steps.cfg.outputs.output }}"

      - name: Commit EXE (config‑driven)
        if: >
          steps.cfg.outputs.CI == 'true' &&
          steps.cfg.outputs.commitEXE == 'true' &&
          github.ref_name == steps.cfg.outputs.commit2
        run: |
          if [[ -n "$(git status --porcelain build/${{ steps.cfg.outputs.output }})" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add build/${{ steps.cfg.outputs.output }}
            git commit -m "chore: auto-update EXE [skip ci]"
            git push
          else
            echo "No EXE changes."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/${{ steps.cfg.outputs.output }}
