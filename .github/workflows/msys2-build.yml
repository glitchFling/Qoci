name: MSYS2 C++ Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load config.js
        id: cfg
        shell: bash
        run: |
          node << 'EOF'
          const fs = require('fs');
          const cfg = require('./msys2.config.js');

          function fail(msg) {
            console.error('CONFIG ERROR:', msg);
            process.exit(1);
          }

          if (typeof cfg.commitEXE !== 'boolean') fail('commitEXE must be boolean');
          if (typeof cfg.CI !== 'boolean') fail('CI must be boolean');

          if (!cfg.Advanced) fail('Advanced missing');
          if (!cfg.Advanced.target) fail('Advanced.target missing');
          if (!cfg.Advanced.output) fail('Advanced.output missing');
          if (!cfg.Advanced.commit2) fail('Advanced.commit2 missing');

          const out =
            `target=${cfg.Advanced.target}\n` +
            `output=${cfg.Advanced.output}\n` +
            `commit2=${cfg.Advanced.commit2}\n` +
            `commitEXE=${cfg.commitEXE}\n` +
            `CI=${cfg.CI}\n`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, out);
          EOF

      - name: Debug config
        shell: bash
        run: |
          echo "Target:  ${{ steps.cfg.outputs.target }}"
          echo "Output:  ${{ steps.cfg.outputs.output }}"
          echo "Commit2: ${{ steps.cfg.outputs.commit2 }}"
          echo "commitEXE: ${{ steps.cfg.outputs.commitEXE }}"
          echo "CI:        ${{ steps.cfg.outputs.CI }}"

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            mingw-w64-x86_64-gcc
          msystem: MINGW64

      - name: Build EXE
        shell: msys2 {0}
        run: |
          mkdir -p build
          g++ "${{ steps.cfg.outputs.target }}" -O2 -static -o "build/${{ steps.cfg.outputs.output }}"

      - name: Commit EXE (config‑driven)
        if: >
          steps.cfg.outputs.CI == 'true' &&
          steps.cfg.outputs.commitEXE == 'true' &&
          github.ref_name == steps.cfg.outputs.commit2
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain "build/${{ steps.cfg.outputs.output }}")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "build/${{ steps.cfg.outputs.output }}"
            git commit -m "chore: auto-update EXE [skip ci]"
            git push
          else
            echo "No EXE changes."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/${{ steps.cfg.outputs.output }}
