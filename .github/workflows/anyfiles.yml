name: AnyFiles?

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Load config
        id: cfg
        run: |
          node <<'EOF'
          const fs = require('fs');
          const cfg = require('./anyfiles.config.js');

          console.log('Config:', cfg);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `target=${cfg.target}\n`);
          EOF

      - name: Find directory containing target
        id: findfile
        run: |
          TARGET="${{ steps.cfg.outputs.target }}"
          echo "Searching for: $TARGET"

          FILE_PATH=$(find . -type f -name "$TARGET" | head -n 1)

          if [ -z "$FILE_PATH" ]; then
            echo "❌ FALSE"
            echo "exists=❌ FALSE" >> $GITHUB_OUTPUT
            exit 0
          fi

          DIR_PATH=$(dirname "$FILE_PATH")

          echo "✔️ TRUE"
          echo "Directory: $DIR_PATH"

          echo "exists=✔️ TRUE" >> $GITHUB_OUTPUT
          echo "directory=$DIR_PATH" >> $GITHUB_OUTPUT
