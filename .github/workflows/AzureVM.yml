name: Run EXE on Azure VM and Record

on:
  workflow_dispatch:

jobs:
  run-and-record:
    runs-on: self-hosted  # your Azure VM runner

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure FFmpeg exists
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg.exe -ErrorAction SilentlyContinue)) {
            Write-Host "FFmpeg not found. Install it manually or script it."
            exit 1
          }

      - name: Start screen recording
        shell: pwsh
        run: |
          Start-Process ffmpeg.exe `
            -ArgumentList "-y -f gdigrab -i desktop -framerate 30 recording.mp4" `
            -WindowStyle Hidden

      - name: Run EXE
        shell: pwsh
        run: |
          Start-Process -FilePath ".\build\Banana.exe" -Wait

      - name: Stop recording
        shell: pwsh
        run: |
          Get-Process ffmpeg -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Upload recording
        uses: actions/upload-artifact@v4
        with:
          name: exe-video
          path: recording.mp4
