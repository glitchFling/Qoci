name: Build and Decompile DLL

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build-dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate dotnet.config.js
        run: |
          if [ ! -f "dotnet.config.js" ]; then
            echo "❌ Error 404: dotnet.config.js not found"
            exit 1
          fi

          node - << 'EOF'
          const fs = require("fs");

          const raw = fs.readFileSync("dotnet.config.js", "utf8");
          let cfg;
          try {
            cfg = require("./dotnet.config.js");
          } catch (e) {
            console.error("❌ Error 400: dotnet.config.js is invalid JS");
            process.exit(1);
          }

          const required = ["commitDll", "commitCs", "CI"];
          for (const key of required) {
            if (!(key in cfg)) {
              console.error(`❌ Error 400: Missing required config field: ${key}`);
              process.exit(1);
            }
          }

          if (!cfg.CI) {
            console.error("❌ CI disabled by config");
            process.exit(1);
          }

          console.log("✔ dotnet.config.js validated");
          EOF

      - name: Validate index.cs
        run: |
          if [ ! -f "index.cs" ]; then
            echo "❌ Error 404: index.cs not found"
            exit 1
          fi

          if [ ! -s "index.cs" ]; then
            echo "❌ Error 400: index.cs is empty"
            exit 1
          fi

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compile index.cs → index.dll
        run: |
          dotnet new console -n temp --no-restore
          rm temp/Program.cs
          mv index.cs temp/
          cd temp
          dotnet build -c Release
          cp bin/Release/*/temp.dll ../index.dll

      - name: Install ILSpy command-line decompiler
        run: dotnet tool install --global ilspycmd

      - name: Decompile DLL → dll.source.cs
        run: |
          ilspycmd index.dll -o dll.source.cs

      - name: Conditional commit based on config
        run: |
          node - << 'EOF'
          const cfg = require("./dotnet.config.js");
          const fs = require("fs");

          if (!cfg.commitDll && !cfg.commitCs) {
            console.log("Config says: commit nothing. Skipping commit.");
            process.exit(0);
          }
          EOF

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if node -e "console.log(require('./dotnet.config.js').commitDll)"; then
            git add index.dll || true
          fi

          if node -e "console.log(require('./dotnet.config.js').commitCs)"; then
            git add dll.source.cs || true
          fi

          git commit -m "CI: update outputs from latest build" || echo "No changes to commit"
          git push
