name: Build and Decompile DLL

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build-dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------
      # CONFIG VALIDATION
      # -------------------------------
      - name: Validate dotnet.config.js
        run: |
          if [ ! -f "dotnet.config.js" ]; then
            echo "❌ Error 404: dotnet.config.js not found"
            exit 1
          fi

          node - << 'EOF'
          const cfg = require("./dotnet.config.js");

          const required = ["commitDll", "commitCs", "CI", "Advanced"];
          for (const key of required) {
            if (!(key in cfg)) {
              console.error(`❌ Missing required config field: ${key}`);
              process.exit(1);
            }
          }

          const adv = cfg.Advanced;
          const advRequired = ["target", "output", "commit2"];

          for (const key of advRequired) {
            if (!(key in adv)) {
              console.error(`❌ Missing Advanced.${key}`);
              process.exit(1);
            }
          }

          if (!cfg.CI) {
            console.error("❌ CI disabled by config");
            process.exit(1);
          }

          if (!adv.target.endsWith(".cs")) {
            console.error("❌ Advanced.target must be a .cs file");
            process.exit(1);
          }

          if (!adv.output.endsWith(".dll")) {
            console.error("❌ Advanced.output must be a .dll file");
            process.exit(1);
          }

          console.log("✔ dotnet.config.js validated");
          EOF

      # -------------------------------
      # SOURCE VALIDATION
      # -------------------------------
      - name: Validate target source file
        run: |
          TARGET=$(node -e "console.log(require('./dotnet.config.js').Advanced.target)")
          if [ ! -f "$TARGET" ]; then
            echo "❌ Error 404: $TARGET not found"
            exit 1
          fi
          if [ ! -s "$TARGET" ]; then
            echo "❌ Error 400: $TARGET is empty"
            exit 1
          fi

      # -------------------------------
      # BUILD
      # -------------------------------
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compile target → output DLL
        run: |
          TARGET=$(node -e "console.log(require('./dotnet.config.js').Advanced.target)")
          OUTPUT=$(node -e "console.log(require('./dotnet.config.js').Advanced.output)")

          dotnet new console -n temp --no-restore
          rm temp/Program.cs
          mv "$TARGET" temp/
          cd temp
          dotnet build -c Release
          cp bin/Release/*/temp.dll "../$OUTPUT"

      # -------------------------------
      # DECOMPILE
      # -------------------------------
      - name: Install ILSpy command-line decompiler
        run: dotnet tool install --global ilspycmd

      - name: Decompile DLL → dll.source.cs
        run: |
          OUTPUT=$(node -e "console.log(require('./dotnet.config.js').Advanced.output)")
          ilspycmd "$OUTPUT" -o dll.source.cs

      # -------------------------------
      # CONDITIONAL COMMIT
      # -------------------------------
      - name: Conditional commit based on config
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          TARGET_BRANCH=$(node -e "console.log(require('./dotnet.config.js').Advanced.commit2)")

          if [ "$BRANCH" != "$TARGET_BRANCH" ]; then
            echo "⏭ Skipping commit: branch mismatch ($BRANCH != $TARGET_BRANCH)"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          OUTPUT=$(node -e "console.log(require('./dotnet.config.js').Advanced.output)")

          # commit DLL only if commitDll === true
          node -e "process.exit(require('./dotnet.config.js').commitDll ? 0 : 1)" \
            && git add "$OUTPUT"

          # commit decompiled source only if commitCs === true
          node -e "process.exit(require('./dotnet.config.js').commitCs ? 0 : 1)" \
            && git add dll.source.cs

          git commit -m "CI: update outputs from latest build" || echo "No changes to commit"
          git push
