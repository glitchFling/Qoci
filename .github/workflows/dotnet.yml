name: .NET CI

on:
  push:
    branches: [ "main" ] # Triggers whenever you push your hard work to main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Using a standard Linux runner

    steps:
    - uses: actions/checkout@v4 # Get your code out of the repo

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Setting the "School" version to .NET 8

    - name: Restore dependencies
      run: dotnet restore # Diligence: Ensuring all your tools are in order

    - name: Build
      run: dotnet build --no-restore # The big test: Does it actually work?

    - name: Test
      run: dotnet test --no-build --verbosity normal # Ensuring no "Wrath" broke the logic
