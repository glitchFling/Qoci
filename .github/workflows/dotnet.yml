name: Build .NET DLL

on:
  push:
    branches:
      - "**"

jobs:
  build-dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate index.cs
        run: |
          if [ ! -f "index.cs" ]; then
            echo "❌ Error 404: index.cs not found"
            exit 1
          fi

          if [ ! -s "index.cs" ]; then
            echo "❌ Error 400: index.cs is empty"
            exit 1
          fi

          echo "✔ index.cs found and non-empty"

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compile index.cs → index.dll
        run: |
          dotnet new console -n temp --no-restore
          rm temp/Program.cs
          mv index.cs temp/
          cd temp
          dotnet build -c Release
          cp bin/Release/*/temp.dll ../index.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: index-dll
          path: index.dll
