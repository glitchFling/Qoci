name: x11docker CI

on: [push]

jobs:
  run-windows-gui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:22.04
          RUN apt-get update && apt-get install -y wine64 xauth xvfb && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY build/Banana.exe .
          EOF

      - name: Build Docker Image
        run: docker build -t banana-wine .

      - name: Install x11docker and X11 dependencies
        run: |
          # Install X11 server tools on the host runner
          sudo apt-get update
          sudo apt-get install -y xinit xvfb xauth
          # Install x11docker script
          curl -fsSL https://githubusercontent.com | sudo bash -s -- --update

      - name: Run GUI App with x11docker
        run: |
          # Use sudo -E to preserve environment variables if needed
          sudo x11docker --xvfb -- wine Banana.exe

