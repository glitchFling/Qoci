name: x11docker CI

on: [push]

jobs:
  run-windows-gui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:22.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y wine64 xauth xvfb && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          # Ensure build/Banana.exe is in your repo
          COPY build/Banana.exe .
          EOF

      - name: Build Docker Image
        run: docker build -t banana-wine .

      - name: Download x11docker and Install Host Deps
        run: |
          sudo apt-get update
          # x11-xserver-utils provides 'cvt' and 'xdpyinfo'
          sudo apt-get install -y xinit xvfb xauth x11-xserver-utils
          curl -fsSL https://githubusercontent.com -o x11docker
          chmod +x x11docker

      - name: Run GUI App with x11docker
        run: |
          # Syntax: x11docker [OPTIONS] IMAGE [COMMAND]
          # --xvfb creates the virtual screen
          # --network allows internet if Banana.exe needs it
          sudo timeout 1m ./x11docker --xvfb --network -- banana-wine wine Banana.exe
