name: x11docker CI with Inline Dockerfile

on: [push]

jobs:
  run-windows-gui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Creates the Dockerfile dynamically in the workspace
      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:22.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y \
              wine64 \
              xauth \
              xvfb \
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          # Ensure Banana.exe is in your repo's root directory
          COPY Banana.exe .
          EOF

      - name: Build Docker Image
        run: docker build -t banana-wine .

      - name: Install x11docker
        run: |
          curl -fsSL https://raw.githubusercontent.com/mviereck/x11docker/master/x11docker | sudo bash -s -- --update

      - name: Run GUI App with x11docker
        # --xvfb creates a virtual display to allow the GUI to run headlessly
        run: sudo x11docker --xvfb -- wine Banana.exe
