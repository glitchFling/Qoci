name: x11docker CI

on: [push]

jobs:
  run-windows-gui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # DEBUG: This lists files to confirm Banana.exe is where you think it is
      - name: List files in workspace
        run: ls -R

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:22.04
          RUN apt-get update && apt-get install -y wine64 xauth xvfb && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          # This line fails if Banana.exe isn't in the root folder
          COPY Banana.exe .
          EOF

      - name: Build Docker Image
        run: docker build -t banana-wine .

      - name: Install x11docker
        run: |
          curl -fsSL https://githubusercontent.com | sudo bash -s -- --update

      - name: Run GUI App with x11docker
        run: sudo x11docker --xvfb -- wine Banana.exe
