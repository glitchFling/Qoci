name: x11docker CI

on: [push]

jobs:
  run-windows-gui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:22.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y wine64 xauth xvfb && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          # Ensure build/Banana.exe exists in your repo
          COPY build/Banana.exe .
          EOF

      - name: Build Docker Image
        run: docker build -t banana-wine .

      - name: Download x11docker and Install Host Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xinit xvfb xauth
          # Using the correct 'raw' subdomain
          curl -fsSL https://raw.githubusercontent.com/mviereck/x11docker/master/x11docker -o x11docker
          chmod +x x11docker

      - name: Run GUI App with x11docker
        run: |
          # Verify local script exists
          ls -l ./x11docker
          # Run with a 1-minute timeout to prevent the pipeline from hanging
          sudo ./x11docker --xvfb -- wine Banana.exe &
          sleep 60
          sudo pkill -f Banana.exe || true
