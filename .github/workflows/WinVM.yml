name: x11docker CI

on: [push]

jobs:
  run-windows-gui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:22.04
          RUN apt-get update && apt-get install -y wine64 xauth xvfb && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY build/Banana.exe .
          EOF

      - name: Build Docker Image
        run: docker build -t banana-wine .

      - name: Install x11docker
        run: |
          # Use the full raw.githubusercontent.com URL
          curl -fsSL https://raw.githubusercontent.com/mviereck/x11docker/master/x11docker | sudo bash -s -- --update

      - name: Run GUI App with x11docker
        run: sudo x11docker --xvfb -- wine Banana.exe
