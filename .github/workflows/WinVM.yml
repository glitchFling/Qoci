name: x11docker CI

on: [push]

jobs:
  run-windows-gui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM ubuntu:22.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y wine64 xauth xvfb && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY build/Banana.exe .
          EOF

      - name: Build Docker Image
        run: docker build -t banana-wine .

      - name: Download x11docker and Install Host Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xinit xvfb xauth
          # Download the script directly to the current folder
          curl -fsSL https://githubusercontent.com -o x11docker
          # Make it executable
          chmod +x x11docker

      - name: Run GUI App with x11docker
        run: |
          # Run the script using the local path (./x11docker)
          # We use "timeout" to ensure the GUI doesn't hang the pipeline forever
          sudo timeout 1m ./x11docker --xvfb -- wine Banana.exe
