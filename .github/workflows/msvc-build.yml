name: MSVC C++ Build (Config Driven)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # 1. Locate target file using AnyFiles
  locate:
    uses: ./.github/workflows/anyfiles.yml

  # 2. Build only if the target file exists
  build:
    needs: locate
    if: needs.locate.outputs.exists == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Load msvc.config.js from the directory AnyFiles found
      - name: Load config.js
        id: cfg
        shell: bash
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const dir = process.env.DIR;
          const configPath = path.join(dir, "msvc.config.js");

          console.log("Loading config from:", configPath);

          if (!fs.existsSync(configPath)) {
            console.error("Config file not found:", configPath);
            process.exit(1);
          }

          const cfg = require(configPath);

          function fail(msg) { console.error(msg); process.exit(1); }

          if (typeof cfg.commitEXE !== 'boolean') fail('commitEXE must be boolean');
          if (typeof cfg.CI !== 'boolean') fail('CI must be boolean');

          if (!cfg.Advanced) fail('Advanced missing');
          if (!cfg.Advanced.target) fail('Advanced.target missing');
          if (!cfg.Advanced.output) fail('Advanced.output missing');
          if (!cfg.Advanced.commit2) fail('Advanced.commit2 missing');
          if (!Array.isArray(cfg.Advanced.flags)) fail('Advanced.flags must be array');

          const flags = cfg.Advanced.flags.join(' ');

          const out =
            `target=${cfg.Advanced.target}\n` +
            `output=${cfg.Advanced.output}\n` +
            `commit2=${cfg.Advanced.commit2}\n` +
            `flags=${flags}\n` +
            `commitEXE=${cfg.commitEXE}\n` +
            `CI=${cfg.CI}\n`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, out);
          EOF
        env:
          DIR: ${{ needs.locate.outputs.directory }}

      # Debug config + AnyFiles directory
      - name: Debug config
        shell: bash
        run: |
          echo "Target:     ${{ steps.cfg.outputs.target }}"
          echo "Output:     ${{ steps.cfg.outputs.output }}"
          echo "Commit2:    ${{ steps.cfg.outputs.commit2 }}"
          echo "Flags:      ${{ steps.cfg.outputs.flags }}"
          echo "commitEXE:  ${{ steps.cfg.outputs.commitEXE }}"
          echo "CI:         ${{ steps.cfg.outputs.CI }}"
          echo "Directory from AnyFiles: ${{ needs.locate.outputs.directory }}"

      # Locate MSVC
      - name: Locate MSVC via vswhere
        id: msvc
        shell: pwsh
        run: |
          $InstallPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (-not $InstallPath) {
            Write-Error "MSVC not found"
            exit 1
          }

          $VcVars = Join-Path $InstallPath "VC\Auxiliary\Build\vcvars64.bat"
          echo "vcvars=$VcVars" >> $env:GITHUB_OUTPUT

      # Build using directory from AnyFiles
      - name: Build with MSVC
        shell: cmd
        run: |
          call "${{ steps.msvc.outputs.vcvars }}"
          if not exist build mkdir build
          cl ${{ steps.cfg.outputs.flags }} "${{ needs.locate.outputs.directory }}\\${{ steps.cfg.outputs.target }}" /Fe:build\${{ steps.cfg.outputs.output }}

      # Commit EXE if config allows
      - name: Commit EXE (config-driven)
        if: >
          steps.cfg.outputs.CI == 'true' &&
          steps.cfg.outputs.commitEXE == 'true' &&
          github.ref_name == steps.cfg.outputs.commit2
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain "build/${{ steps.cfg.outputs.output }}")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "build/${{ steps.cfg.outputs.output }}"
            git commit -m "chore: auto-update EXE [skip ci]"
            git push
          else
            echo "No EXE changes."
          fi

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/${{ steps.cfg.outputs.output }}
