name: MSVC C++ Build (Standalone)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Locate msvc.config.js anywhere in the repo
      - name: Locate msvc.config.js
        id: locate_cfg
        shell: bash
        run: |
          echo "Searching for msvc.config.js..."

          CONFIGS=$(find . -type f -name "msvc.config.js")
          COUNT=$(echo "$CONFIGS" | wc -l)

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No msvc.config.js found"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "❌ Multiple msvc.config.js files found:"
            echo "$CONFIGS"
            exit 1
          fi

          CONFIG_PATH=$(echo "$CONFIGS")
          echo "Found config at: $CONFIG_PATH"

          echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT

      # 2. Load config and split compiler/linker flags
      - name: Load config.js
        id: cfg
        shell: bash
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const configPath = process.env.CONFIG_PATH;
          console.log("Loading config from:", configPath);

          const cfg = require(path.resolve(configPath));

          function fail(msg) { console.error(msg); process.exit(1); }

          if (!cfg.Advanced) fail("Advanced missing");
          if (!cfg.Advanced.target) fail("Advanced.target missing");
          if (!cfg.Advanced.output) fail("Advanced.output missing");
          if (!cfg.Advanced.commit2) fail("Advanced.commit2 missing");

          const compilerFlags = cfg.Advanced.flags || [];
          const linkerFlags = cfg.Advanced.linkflags || [];

          const out =
            `target=${cfg.Advanced.target}\n` +
            `output=${cfg.Advanced.output}\n` +
            `commit2=${cfg.Advanced.commit2}\n` +
            `compiler=${compilerFlags.join(" ")}\n` +
            `linker=${linkerFlags.join(" ")}\n` +
            `commitEXE=${cfg.commitEXE}\n` +
            `CI=${cfg.CI}\n`;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, out);
          EOF
        env:
          CONFIG_PATH: ${{ steps.locate_cfg.outputs.config_path }}

      # 3. Locate the target source file anywhere in repo
      - name: Locate source file
        id: locate_src
        shell: bash
        run: |
          TARGET="${{ steps.cfg.outputs.target }}"
          echo "Searching for source file: $TARGET"

          FILE_PATH=$(find . -type f -name "$TARGET" | head -n 1)

          if [ -z "$FILE_PATH" ]; then
            echo "❌ Source file not found: $TARGET"
            exit 1
          fi

          echo "Found at: $FILE_PATH"
          echo "filepath=$FILE_PATH" >> $GITHUB_OUTPUT

      # 4. Locate MSVC
      - name: Locate MSVC via vswhere
        id: msvc
        shell: pwsh
        run: |
          $InstallPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (-not $InstallPath) {
            Write-Error "MSVC not found"
            exit 1
          }

          $VcVars = Join-Path $InstallPath "VC\Auxiliary\Build\vcvars64.bat"
          echo "vcvars=$VcVars" >> $env:GITHUB_OUTPUT

      # 5. Build with MSVC (correct flag order)
      - name: Build with MSVC
        shell: cmd
        run: |
          call "${{ steps.msvc.outputs.vcvars }}"
          if not exist build mkdir build
          cl ${{ steps.cfg.outputs.compiler }} "${{ steps.locate_src.outputs.filepath }}" /Fe:build\${{ steps.cfg.outputs.output }} /link ${{ steps.cfg.outputs.linker }}

      # 6. Commit EXE if config allows
      - name: Commit EXE (config-driven)
        if: >
          steps.cfg.outputs.CI == 'true' &&
          steps.cfg.outputs.commitEXE == 'true' &&
          github.ref_name == steps.cfg.outputs.commit2
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain "build/${{ steps.cfg.outputs.output }}")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "build/${{ steps.cfg.outputs.output }}"
            git commit -m "chore: auto-update EXE [skip ci]"
            git push
          else
            echo "No EXE changes."
          fi

      # 7. Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/${{ steps.cfg.outputs.output }}
