name: MSVC C++ Build (Config Driven)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # 1. Locate target file using AnyFiles
  locate:
    uses: ./.github/workflows/anyfiles.yml

  # 2. Build only if the target file exists
  build:
    needs: locate
    if: needs.locate.outputs.exists == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Load msvc.config.js from the directory AnyFiles found
      - name: Locate msvc.config.js anywhere in repo
        id: locate_msvc_cfg
        shell: bash
        run: |
          echo "Searching for msvc.config.js in entire repo..."
      
          CONFIGS=$(find . -type f -name "msvc.config.js")
      
          COUNT=$(echo "$CONFIGS" | wc -l)
      
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No msvc.config.js found"
            exit 1
          fi
      
          if [ "$COUNT" -gt 1 ]; then
            echo "❌ Multiple msvc.config.js files found:"
            echo "$CONFIGS"
            exit 1
          fi
      
          CONFIG_PATH=$(echo "$CONFIGS")
          echo "Found config at: $CONFIG_PATH"
      
          echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT




      # Debug config + AnyFiles directory
      - name: Debug config
        shell: bash
        run: |
          echo "Target:     ${{ steps.cfg.outputs.target }}"
          echo "Output:     ${{ steps.cfg.outputs.output }}"
          echo "Commit2:    ${{ steps.cfg.outputs.commit2 }}"
          echo "Flags:      ${{ steps.cfg.outputs.flags }}"
          echo "commitEXE:  ${{ steps.cfg.outputs.commitEXE }}"
          echo "CI:         ${{ steps.cfg.outputs.CI }}"
          echo "Directory from AnyFiles: ${{ needs.locate.outputs.directory }}"

      # Locate MSVC
      - name: Locate MSVC via vswhere
        id: msvc
        shell: pwsh
        run: |
          $InstallPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (-not $InstallPath) {
            Write-Error "MSVC not found"
            exit 1
          }

          $VcVars = Join-Path $InstallPath "VC\Auxiliary\Build\vcvars64.bat"
          echo "vcvars=$VcVars" >> $env:GITHUB_OUTPUT

      # Build using directory from AnyFiles
      - name: Build with MSVC
        shell: cmd
        run: |
          call "${{ steps.msvc.outputs.vcvars }}"
          if not exist build mkdir build
          cl ${{ steps.cfg.outputs.flags }} "${{ needs.locate.outputs.directory }}\\${{ steps.cfg.outputs.target }}" /Fe:build\${{ steps.cfg.outputs.output }}

      # Commit EXE if config allows
      - name: Commit EXE (config-driven)
        if: >
          steps.cfg.outputs.CI == 'true' &&
          steps.cfg.outputs.commitEXE == 'true' &&
          github.ref_name == steps.cfg.outputs.commit2
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain "build/${{ steps.cfg.outputs.output }}")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "build/${{ steps.cfg.outputs.output }}"
            git commit -m "chore: auto-update EXE [skip ci]"
            git push
          else
            echo "No EXE changes."
          fi

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: build/${{ steps.cfg.outputs.output }}
